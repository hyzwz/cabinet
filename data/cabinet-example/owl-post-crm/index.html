<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owl Post — Weasleys' Wizard Wheezes CRM</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0B1426;
  --navy-light:#12203A;
  --navy-mid:#1A2D4E;
  --parchment:#F5F0E8;
  --parchment-dark:#E8DFD0;
  --gold:#D4A847;
  --gold-dim:#A8863A;
  --ice:#7CB9E8;
  --ice-dim:#5A9AD0;
  --cold:#5B8FD4;
  --warm:#D4A847;
  --hot:#D45B5B;
  --closed:#5BD47A;
  --gryffindor:#AE2029;
  --ravenclaw:#2A5CB7;
  --slytherin:#1A7A3A;
  --hufflepuff:#D4A847;
  --ministry:#5A3D8A;
  --business:#C07030;
  --text-dark:#2C1810;
  --text-muted:#6B5D50;
}

@keyframes twinkle{
  0%,100%{opacity:.3}
  50%{opacity:.8}
}

@keyframes floatUp{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(-80px) rotate(45deg);opacity:0}
}

@keyframes owlFly{
  0%{left:-80px;top:60%;opacity:0;transform:scaleX(1)}
  10%{opacity:1}
  30%{top:35%}
  50%{top:45%}
  70%{top:30%}
  90%{opacity:1}
  100%{left:calc(100% + 80px);top:40%;opacity:0;transform:scaleX(1)}
}

@keyframes featherDrift{
  0%{opacity:.8;transform:translateY(0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translateY(60px) rotate(180deg) scale(.3)}
}

@keyframes scrollUnfurl{
  0%{max-height:0;opacity:0;transform:scaleY(0)}
  100%{max-height:700px;opacity:1;transform:scaleY(1)}
}

@keyframes toastSlide{
  0%{transform:translateX(120%);opacity:0}
  10%{transform:translateX(0);opacity:1}
  90%{transform:translateX(0);opacity:1}
  100%{transform:translateX(120%);opacity:0}
}

@keyframes countUp{
  0%{opacity:0;transform:translateY(8px)}
  100%{opacity:1;transform:translateY(0)}
}

@keyframes cardLift{
  0%{box-shadow:0 1px 3px rgba(0,0,0,.1)}
  100%{box-shadow:0 12px 32px rgba(0,0,0,.25)}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms!important;
    animation-iteration-count:1!important;
    transition-duration:0.01ms!important;
  }
}

html{font-size:15px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--navy);
  color:var(--parchment);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* Star field */
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 25% 40%,rgba(255,255,255,.4),transparent),
    radial-gradient(1.5px 1.5px at 45% 10%,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 60% 55%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 75% 20%,rgba(255,255,255,.5),transparent),
    radial-gradient(1.5px 1.5px at 85% 65%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 15% 70%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 35% 85%,rgba(255,255,255,.5),transparent),
    radial-gradient(1.5px 1.5px at 55% 75%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 90% 35%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 5% 90%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 70% 90%,rgba(255,255,255,.5),transparent),
    radial-gradient(1.5px 1.5px at 40% 50%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 95% 80%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.5),transparent),
    radial-gradient(1.5px 1.5px at 80% 45%,rgba(255,255,255,.6),transparent);
  z-index:0;
}

/* Top Bar */
.top-bar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:16px;
  padding:12px 24px;
  background:linear-gradient(180deg,rgba(11,20,38,.98),rgba(11,20,38,.92));
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(212,168,71,.2);
}

.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo svg{width:32px;height:32px;fill:var(--gold)}
.logo h1{
  font-family:Georgia,'Times New Roman',serif;
  font-size:1.4rem;letter-spacing:2px;color:var(--gold);
  text-shadow:0 0 20px rgba(212,168,71,.3);
}

.pipeline-total{
  font-family:Georgia,serif;
  font-size:.95rem;color:var(--gold);
  opacity:.9;white-space:nowrap;
  animation:countUp .6s ease;
}
.pipeline-total .amount{font-weight:700;font-size:1.1rem}

.search-box{
  position:relative;flex:0 1 260px;margin-left:auto;
}
.search-box input{
  width:100%;padding:8px 12px 8px 34px;
  border-radius:8px;border:1px solid rgba(212,168,71,.25);
  background:var(--navy-light);color:var(--parchment);
  font-size:.85rem;outline:none;
  transition:border-color .2s;
}
.search-box input::placeholder{color:rgba(245,240,232,.35)}
.search-box input:focus{border-color:var(--gold)}
.search-box svg{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;stroke:rgba(245,240,232,.4);fill:none;
}

.btn-compose{
  display:flex;align-items:center;gap:8px;
  padding:9px 20px;border-radius:8px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),#C09A3A);
  color:var(--navy);font-weight:700;font-size:.85rem;
  letter-spacing:.5px;white-space:nowrap;
  box-shadow:0 2px 12px rgba(212,168,71,.3);
  transition:transform .15s,box-shadow .15s;
}
.btn-compose:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,168,71,.45)}
.btn-compose:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.btn-compose svg{width:18px;height:18px}

/* Filter Pills */
.filter-bar{
  display:flex;align-items:center;gap:8px;
  padding:10px 24px;
  position:relative;z-index:1;
}
.filter-pill{
  padding:6px 14px;border-radius:20px;border:1px solid rgba(212,168,71,.15);
  background:transparent;color:var(--parchment);
  font-size:.8rem;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:6px;
}
.filter-pill:hover{border-color:rgba(212,168,71,.4);background:rgba(212,168,71,.08)}
.filter-pill.active{
  border-color:var(--gold);
  background:rgba(212,168,71,.12);
  box-shadow:0 2px 0 var(--gold);
}
.filter-pill:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.filter-badge{
  background:rgba(212,168,71,.2);padding:1px 7px;border-radius:10px;
  font-size:.7rem;color:var(--gold);
}

/* Pipeline Funnel */
.pipeline-funnel{
  margin:0 24px 12px;padding:0;
  display:flex;height:32px;border-radius:8px;overflow:hidden;
  background:var(--navy-light);
  border:1px solid rgba(255,255,255,.06);
  position:relative;z-index:1;
}
.funnel-segment{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:.72rem;font-weight:600;
  transition:flex .5s ease;
  white-space:nowrap;overflow:hidden;
  min-width:0;
}
.funnel-segment .seg-label{opacity:.85}
.funnel-segment .seg-value{font-weight:800}
.funnel-cold{background:rgba(91,143,212,.35);color:#B8D4F0}
.funnel-warm{background:rgba(212,168,71,.35);color:#F0DCA0}
.funnel-hot{background:rgba(212,91,91,.35);color:#F0B8B8}
.funnel-closed{background:rgba(91,212,122,.35);color:#B8F0C8}

/* Kanban Board */
.board{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  padding:8px 24px 24px;
  position:relative;z-index:1;
  min-height:60vh;
}

.column{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:0;
  display:flex;flex-direction:column;
  min-height:300px;
  transition:background .2s,border-color .2s;
}
.column.drag-over{
  border-color:rgba(212,168,71,.5);
  background:rgba(212,168,71,.06);
}

.col-header{
  display:flex;align-items:center;gap:8px;
  padding:14px 14px 10px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.col-dot.cold{background:var(--cold)}
.col-dot.warm{background:var(--warm)}
.col-dot.hot{background:var(--hot)}
.col-dot.closed{background:var(--closed)}
.col-title{font-family:Georgia,serif;font-size:.95rem;font-weight:700}
.col-meta{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--text-muted)}
.col-count{
  background:rgba(255,255,255,.08);padding:2px 8px;border-radius:10px;
  font-size:.7rem;color:var(--parchment);
}
.col-total{color:var(--gold);font-weight:600;font-size:.75rem}

.col-cards{
  flex:1;padding:10px;overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
}

/* Lead Cards — Sealed Letters */
.lead-card{
  position:relative;
  background:var(--parchment);
  border-radius:8px;
  padding:14px 14px 10px 18px;
  cursor:grab;
  color:var(--text-dark);
  transition:transform .15s,box-shadow .15s;
  /* Paper texture via subtle gradient */
  background-image:
    linear-gradient(135deg,rgba(0,0,0,.01) 25%,transparent 25%),
    linear-gradient(225deg,rgba(0,0,0,.01) 25%,transparent 25%),
    linear-gradient(315deg,rgba(0,0,0,.01) 25%,transparent 25%),
    linear-gradient(45deg,rgba(0,0,0,.01) 25%,transparent 25%);
  background-size:20px 20px;
  background-color:var(--parchment);
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}
.lead-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:5px;
  border-radius:8px 0 0 8px;
}
.lead-card[data-stage="cold"]::before{background:var(--cold)}
.lead-card[data-stage="warm"]::before{background:var(--warm)}
.lead-card[data-stage="hot"]::before{background:var(--hot)}
.lead-card[data-stage="closed"]::before{background:var(--closed)}

.lead-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.lead-card.dragging{opacity:.5;transform:rotate(2deg)}
.lead-card:focus-visible{outline:3px solid var(--gold);outline-offset:2px}

/* Wax seal fold line */
.lead-card::after{
  content:'';position:absolute;right:12px;top:12px;
  width:20px;height:20px;
  border-right:1px solid rgba(0,0,0,.06);
  border-bottom:1px solid rgba(0,0,0,.06);
  transform:rotate(-45deg);
  pointer-events:none;
}

.card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}

.wax-seal{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-weight:700;font-size:.95rem;
  color:#fff;flex-shrink:0;
  box-shadow:inset 0 -2px 4px rgba(0,0,0,.2),0 2px 6px rgba(0,0,0,.15);
  text-shadow:0 1px 2px rgba(0,0,0,.3);
  position:relative;
}
/* Wax seal texture ring */
.wax-seal::after{
  content:'';position:absolute;inset:2px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);
}

.card-name{font-family:Georgia,serif;font-weight:700;font-size:.9rem;line-height:1.2}
.card-affiliation{
  font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text-muted);margin-top:1px;
}

.card-seeks{
  font-size:.78rem;color:var(--text-muted);
  margin-bottom:6px;font-style:italic;
}
.card-seeks strong{color:var(--text-dark);font-style:normal}

.card-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:8px;
  border-top:1px dashed rgba(0,0,0,.08);
}

.card-value{
  font-family:Georgia,serif;font-weight:700;font-size:.9rem;
  color:var(--gold-dim);
}

.card-owl-time{
  display:flex;align-items:center;gap:4px;
  font-size:.68rem;color:var(--text-muted);
}
.card-owl-time svg{width:12px;height:12px;fill:var(--text-muted);opacity:.6}

.card-actions{
  display:flex;align-items:center;gap:2px;
  margin-top:6px;
}
.card-actions button{
  background:none;border:none;cursor:pointer;
  padding:4px 6px;border-radius:4px;font-size:.85rem;
  transition:background .15s;color:var(--text-muted);
}
.card-actions button:hover{background:rgba(0,0,0,.06)}
.card-actions button:focus-visible{outline:2px solid var(--gold);outline-offset:1px}

/* Card Expansion */
.card-expanded-content{
  display:none;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid rgba(0,0,0,.08);
}
.lead-card.expanded .card-expanded-content{display:block}

.card-expanded-content label{
  display:block;font-size:.7rem;text-transform:uppercase;
  letter-spacing:1px;color:var(--text-muted);margin-bottom:4px;
  font-weight:600;
}
.card-expanded-content textarea{
  width:100%;height:60px;border:1px solid rgba(0,0,0,.1);
  border-radius:6px;padding:8px;font-size:.78rem;
  background:rgba(255,255,255,.5);resize:vertical;
  font-family:inherit;color:var(--text-dark);
}
.card-expanded-content textarea:focus{outline:2px solid var(--gold);border-color:transparent}

.card-timeline{margin:10px 0;padding-left:14px;border-left:2px solid rgba(0,0,0,.08)}
.timeline-event{
  font-size:.72rem;color:var(--text-muted);
  padding:3px 0;position:relative;
}
.timeline-event::before{
  content:'';position:absolute;left:-19px;top:8px;
  width:8px;height:8px;border-radius:50%;
  background:var(--gold);border:2px solid var(--parchment);
}
.timeline-event strong{color:var(--text-dark)}

.card-next-action{margin-top:8px}
.card-next-action input{
  width:100%;padding:6px 8px;border:1px solid rgba(0,0,0,.1);
  border-radius:6px;font-size:.78rem;background:rgba(255,255,255,.5);
  color:var(--text-dark);
}
.card-next-action input:focus{outline:2px solid var(--gold);border-color:transparent}

.btn-close-card{
  display:block;margin:10px auto 0;padding:4px 16px;
  border:1px solid rgba(0,0,0,.1);border-radius:6px;
  background:transparent;cursor:pointer;font-size:.72rem;
  color:var(--text-muted);transition:all .15s;
}
.btn-close-card:hover{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.2)}
.btn-close-card:focus-visible{outline:2px solid var(--gold)}

/* Toast */
.toast-container{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  padding:12px 20px;border-radius:10px;
  background:var(--navy-mid);
  border:1px solid rgba(212,168,71,.3);
  color:var(--parchment);font-size:.82rem;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  animation:toastSlide 3.5s ease forwards;
  display:flex;align-items:center;gap:8px;
}
.toast svg{width:16px;height:16px;fill:var(--gold)}

/* Compose Owl Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(11,20,38,.8);
  backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}

.compose-modal{
  width:500px;max-width:92vw;
  background:var(--parchment);
  border-radius:12px;
  color:var(--text-dark);
  position:relative;
  overflow:hidden;
  animation:scrollUnfurl .4s ease;
  transform-origin:top center;
  /* Scroll edge decoration */
  border:2px solid var(--gold);
  box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 0 30px rgba(0,0,0,.03);
}
/* Scroll top curl */
.compose-modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:8px;
  background:linear-gradient(180deg,rgba(0,0,0,.08),transparent);
  border-radius:12px 12px 0 0;
}
/* Scroll bottom curl */
.compose-modal::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:8px;
  background:linear-gradient(0deg,rgba(0,0,0,.08),transparent);
  border-radius:0 0 12px 12px;
}

.compose-header{
  padding:20px 24px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(0,0,0,.08);
}
.compose-header h2{
  font-family:Georgia,serif;font-size:1.2rem;color:var(--text-dark);
  display:flex;align-items:center;gap:8px;
}
.btn-close-modal{
  background:none;border:none;cursor:pointer;font-size:1.3rem;
  color:var(--text-muted);padding:4px;border-radius:4px;
  transition:color .15s;
}
.btn-close-modal:hover{color:var(--text-dark)}
.btn-close-modal:focus-visible{outline:2px solid var(--gold)}

.compose-body{padding:16px 24px 24px}

.compose-field{margin-bottom:14px}
.compose-field label{
  display:block;font-size:.72rem;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--text-muted);margin-bottom:5px;
  font-weight:600;
}
.compose-field input,.compose-field textarea{
  width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,.12);
  border-radius:8px;font-size:.85rem;
  background:rgba(255,255,255,.6);color:var(--text-dark);
  font-family:inherit;
}
.compose-field input:focus,.compose-field textarea:focus{
  outline:2px solid var(--gold);border-color:transparent;
}
.compose-field textarea{height:120px;resize:vertical}

/* To field autocomplete */
.to-field-wrap{position:relative}
.autocomplete-dropdown{
  display:none;
  position:absolute;top:100%;left:0;right:0;
  background:var(--parchment);border:1px solid rgba(0,0,0,.12);
  border-radius:0 0 8px 8px;box-shadow:0 4px 12px rgba(0,0,0,.1);
  max-height:180px;overflow-y:auto;z-index:10;
}
.autocomplete-dropdown.open{display:block}
.autocomplete-item{
  padding:8px 12px;cursor:pointer;font-size:.82rem;
  display:flex;align-items:center;gap:8px;
  transition:background .1s;
}
.autocomplete-item:hover,.autocomplete-item.highlighted{
  background:rgba(212,168,71,.12);
}
.autocomplete-item .mini-seal{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:700;color:#fff;
}

/* Template Seals */
.template-seals{
  display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;
}
.template-seal{
  width:52px;height:52px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;border:2px solid transparent;
  font-size:.55rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;transition:all .15s;
  box-shadow:inset 0 -2px 4px rgba(0,0,0,.15),0 2px 6px rgba(0,0,0,.1);
  color:#fff;
}
.template-seal:hover{transform:scale(1.08)}
.template-seal.active{border-color:var(--text-dark);transform:scale(1.08)}
.template-seal:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.template-seal[data-template="intro"]{background:var(--cold)}
.template-seal[data-template="followup"]{background:var(--warm)}
.template-seal[data-template="offer"]{background:var(--hot)}
.template-seal[data-template="thanks"]{background:var(--closed)}
.template-seal span{margin-top:2px;font-size:.5rem}

.btn-send-owl{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--gold),#C09A3A);
  color:var(--navy);font-weight:700;font-size:.95rem;
  cursor:pointer;letter-spacing:.5px;
  box-shadow:0 2px 12px rgba(212,168,71,.3);
  transition:transform .15s,box-shadow .15s;
}
.btn-send-owl:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,168,71,.45)}
.btn-send-owl:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* Owl Flight Animation */
.owl-flight{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:9998;
  display:none;
}
.owl-flight.active{display:block}
.flying-owl{
  position:absolute;
  width:60px;height:40px;
  animation:owlFly 2s ease-in-out forwards;
}
.flying-owl svg{width:100%;height:100%;fill:var(--gold)}

.feather{
  position:absolute;width:8px;height:16px;
  background:var(--gold);

<!-- Filter Pills -->

          <ellipse cx="20" cy="18" rx="14" ry="12" fill="none" stroke="currentColor" stroke-width="1.5"/>

<script>
// =============================================
// DATA
// =============================================
const LEADS = [
  { id:1, name:"Neville Longbottom", initial:"N", house:"hufflepuff", affiliation:"Hogwarts", category:"hogwarts", seeks:"Herbology prank kits", value:260, stage:"cold", lastOwl:5, color:"var(--hufflepuff)",
    notes:"Interested in self-repotting plants that insult passersby.", history:["Visited shop 2 weeks ago","Asked about Screaming Seedlings","Received catalog by owl"], nextAction:"Send Herbology special offer" },
  { id:2, name:"Draco Malfoy", initial:"D", house:"slytherin", affiliation:"Malfoy Manor", category:"hogwarts", seeks:"Premium gift boxes", value:520, stage:"cold", lastOwl:8, color:"var(--slytherin)",
    notes:"Wants luxury packaging. Very particular about branding.", history:["Initial inquiry via house-elf","Requested exclusive catalog","Discussed custom wax seals"], nextAction:"Send premium sample box" },
  { id:3, name:"Kingsley Shacklebolt", initial:"K", house:"ministry", affiliation:"Ministry of Magic", category:"ministry", seeks:"Bulk defensive novelties", value:750, stage:"cold", lastOwl:2, color:"var(--ministry)",
    notes:"Departmental order for morale-boosting desk toys.", history:["Met at Ministry gala","Follow-up meeting scheduled","Budget approved pending samples"], nextAction:"Deliver sample crate to Ministry" },
  { id:4, name:"Hermione Granger", initial:"H", house:"gryffindor", affiliation:"Dept. of Magical Law", category:"ministry", seeks:"Educational trick quills", value:480, stage:"warm", lastOwl:3, color:"var(--gryffindor)",
    notes:"Wants quills that correct grammar while writing. Very on-brand.", history:["Owled inquiry about Smart Quills","Discussed educational licensing","Sent product specs"], nextAction:"Finalize quill enchantment specs" },
  { id:5, name:"Luna Lovegood", initial:"L", house:"ravenclaw", affiliation:"The Quibbler", category:"business", seeks:"Invisible ink subscriptions", value:320, stage:"warm", lastOwl:1, color:"var(--ravenclaw)",
    notes:"Wants invisible ink for secret Quibbler supplements.", history:["Bumped into at Diagon Alley","Discussed bulk ink pricing","Tested samples - loved the Nargle-scented variant"], nextAction:"Send revised pricing for quarterly supply" },
  { id:6, name:"Cho Chang", initial:"C", house:"ravenclaw", affiliation:"Tutshill Tornados", category:"business", seeks:"Team-branded fireworks", value:210, stage:"warm", lastOwl:4, color:"var(--ravenclaw)",
    notes:"Wants fireworks in team colors for match celebrations.", history:["Agent reached out","Discussed custom color options","Awaiting team manager approval"], nextAction:"Follow up on approval status" },
  { id:7, name:"Lee Jordan", initial:"L", house:"gryffindor", affiliation:"WWN Radio", category:"business", seeks:"Commentator voice changers", value:610, stage:"hot", lastOwl:1, color:"var(--gryffindor)",
    notes:"Wants voice modulation candies for radio segments.", history:["Long-time customer","Tested prototypes on air","Listeners loved the dragon-voice variant","Negotiating bulk deal"], nextAction:"Close the deal this week" },
  { id:8, name:"Angelina Johnson", initial:"A", house:"gryffindor", affiliation:"Gryffindor Quidditch", category:"hogwarts", seeks:"Trick bludger training sets", value:390, stage:"hot", lastOwl:2, color:"var(--gryffindor)",
    notes:"Wants practice bludgers that taunt players to improve reflexes.", history:["Contacted via Oliver Wood","Demo at training ground","Team voted to purchase"], nextAction:"Send final invoice" },
  { id:9, name:"Arthur Weasley", initial:"A", house:"gryffindor", affiliation:"The Burrow", category:"hogwarts", seeks:"Muggle magic kits", value:180, stage:"closed", lastOwl:0, color:"var(--gryffindor)",
    notes:"Dad discount applied. Absolutely thrilled with rubber ducks that quack spells.", history:["Family order","Picked items personally","Paid in full","Sent thank-you owl"], nextAction:"Send holiday catalog" },
  { id:10, name:"Madam Rosmerta", initial:"R", house:"business", affiliation:"Three Broomsticks", category:"business", seeks:"Tavern trick coasters", value:440, stage:"closed", lastOwl:1, color:"var(--business)",
    notes:"Coasters that tell fortunes when you set down your butterbeer.", history:["Met at Hogsmeade visit","Loved the fortune-telling concept","Ordered 500 units","Delivery complete"], nextAction:"Check in for reorder" },
];

let activeFilter = 'all';

// =============================================
// RENDER
// =============================================
function getLeads() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return LEADS.filter(l => {
    if (activeFilter !== 'all' && l.category !== activeFilter) return false;
    if (q && !l.name.toLowerCase().includes(q)) return false;
    return true;
  });
}

function stageLeads(stage) {
  return getLeads().filter(l => l.stage === stage);
}

function createCardHTML(lead) {
  const owlText = lead.lastOwl === 0 ? 'Today' : lead.lastOwl === 1 ? '1 day ago' : `${lead.lastOwl} days ago`;
  const historyHTML = lead.history.map(h => `<div class="timeline-event"><strong>${h}</strong></div>`).join('');

  return `
    <div class="lead-card" draggable="true" data-id="${lead.id}" data-stage="${lead.stage}" data-category="${lead.category}"
         role="listitem" aria-label="${lead.name}, ${lead.value} Galleons, ${lead.stage}" tabindex="0">
      <div class="card-top">
        <div class="wax-seal" style="background:${lead.color}" aria-hidden="true">${lead.initial}</div>
        <div>
          <div class="card-name">${lead.name}</div>
          <div class="card-affiliation">${lead.affiliation}</div>
        </div>
      </div>
      <div class="card-seeks"><strong>Seeks:</strong> ${lead.seeks}</div>
      <div class="card-bottom">
        <div class="card-value">${lead.value} Galleons</div>
        <div class="card-owl-time">
          <svg viewBox="0 0 24 24" aria-hidden="true"><ellipse cx="12" cy="11" rx="8" ry="7"/><circle cx="9" cy="9" r="1.5"/><circle cx="15" cy="9" r="1.5"/><path d="M10 13 Q12 15 14 13"/></svg>
          Last owl: ${owlText}
        </div>
      </div>
      <div class="card-actions">
        <button aria-label="Send owl to ${lead.name}" title="Send Owl" onclick="event.stopPropagation();openComposeFor('${lead.name}')">&#x1F989;</button>
        <button aria-label="Mark ${lead.name} as priority" title="Priority" onclick="event.stopPropagation();showToast('${lead.name} marked as priority!')">&#x2B50;</button>
        <button aria-label="More actions for ${lead.name}" title="More" onclick="event.stopPropagation();showToast('More options for ${lead.name}')">&#x22EF;</button>
      </div>
      <div class="card-expanded-content">
        <label>Notes</label>
        <textarea aria-label="Notes for ${lead.name}">${lead.notes}</textarea>
        <label style="margin-top:10px">Deal History</label>
        <div class="card-timeline">${historyHTML}</div>
        <div class="card-next-action">
          <label for="next-${lead.id}">Next Action</label>
          <input type="text" id="next-${lead.id}" value="${lead.nextAction}" aria-label="Next action for ${lead.name}">
        </div>
        <button class="btn-close-card" onclick="event.stopPropagation();collapseCard(this)" aria-label="Close expanded details">Close</button>
      </div>
    </div>`;
}

function render() {
  const stages = ['cold','warm','hot','closed'];
  let grandTotal = 0;
  const stageTotals = {};
  const stageCounts = {};

  stages.forEach(s => {
    const leads = stageLeads(s);
    const container = document.querySelector(`#col${s.charAt(0).toUpperCase()+s.slice(1)} .col-cards`);
    container.innerHTML = leads.map(createCardHTML).join('');
    const total = leads.reduce((a,l) => a+l.value, 0);
    stageTotals[s] = total;
    stageCounts[s] = leads.length;
    grandTotal += total;
    document.getElementById(`count${s.charAt(0).toUpperCase()+s.slice(1)}`).textContent = leads.length;
    document.getElementById(`total${s.charAt(0).toUpperCase()+s.slice(1)}`).textContent = total + 'g';
  });

  // Pipeline total
  document.getElementById('pipelineTotal').textContent = grandTotal.toLocaleString();

  // Funnel segments
  if (grandTotal > 0) {
    stages.forEach(s => {
      const seg = document.getElementById(`funnel${s.charAt(0).toUpperCase()+s.slice(1)}`);
      const pct = (stageTotals[s] / grandTotal) * 100;
      seg.style.flex = pct;
      seg.querySelector('.seg-value').textContent = `${stageCounts[s]} · ${stageTotals[s]}g`;
    });
  }

  // Filter counts
  const allLeads = LEADS.filter(l => {
    const q = document.getElementById('searchInput').value.toLowerCase();
    return !q || l.name.toLowerCase().includes(q);
  });
  document.getElementById('filterAll').textContent = allLeads.length;
  document.getElementById('filterHogwarts').textContent = allLeads.filter(l=>l.category==='hogwarts').length;
  document.getElementById('filterMinistry').textContent = allLeads.filter(l=>l.category==='ministry').length;
  document.getElementById('filterBusiness').textContent = allLeads.filter(l=>l.category==='business').length;

  // Re-attach drag events
  attachDragEvents();
}

// =============================================
// DRAG AND DROP
// =============================================
let draggedId = null;

function attachDragEvents() {
  document.querySelectorAll('.lead-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      draggedId = parseInt(card.dataset.id);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.id);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      draggedId = null;
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    });
    // Card expansion on click
    card.addEventListener('click', () => {
      const wasExpanded = card.classList.contains('expanded');
      // Collapse all others
      document.querySelectorAll('.lead-card.expanded').forEach(c => c.classList.remove('expanded'));
      if (!wasExpanded) card.classList.add('expanded');
    });
    // Keyboard
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter') card.click();
      if (e.key === 'Escape') card.classList.remove('expanded');
    });
  });

  document.querySelectorAll('.column').forEach(col => {
    const cardsArea = col.querySelector('.col-cards');
    cardsArea.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drag-over');
    });
    cardsArea.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
    });
    cardsArea.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const newStage = col.dataset.stage;
      const lead = LEADS.find(l => l.id === draggedId);
      if (lead && lead.stage !== newStage) {
        const oldStage = lead.stage;
        lead.stage = newStage;
        render();
        const excitement = ['the owls are excited','magic is in the air','the parchment glows','mischief managed'];
        showToast(`${lead.name} moved to ${newStage.charAt(0).toUpperCase()+newStage.slice(1)} — ${excitement[Math.floor(Math.random()*excitement.length)]}`);
      }
    });
  });
}

function collapseCard(btn) {
  btn.closest('.lead-card').classList.remove('expanded');
}

// =============================================
// SEARCH
// =============================================
document.getElementById('searchInput').addEventListener('input', render);

// =============================================
// FILTER PILLS
// =============================================
document.querySelectorAll('.filter-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(p => { p.classList.remove('active'); p.setAttribute('aria-pressed','false'); });
    pill.classList.add('active');
    pill.setAttribute('aria-pressed','true');
    activeFilter = pill.dataset.filter;
    render();
  });
});

// =============================================
// TOAST
// =============================================
function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true"><ellipse cx="12" cy="11" rx="8" ry="7"/><circle cx="9" cy="9" r="1.5"/><circle cx="15" cy="9" r="1.5"/><path d="M10 13 Q12 15 14 13"/></svg>${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3600);
}

// =============================================
// COMPOSE MODAL
// =============================================
const modal = document.getElementById('composeModal');
const composeTo = document.getElementById('composeTo');
const composeMsg = document.getElementById('composeMsg');
const autocompleteList = document.getElementById('autocompleteList');
let selectedTemplate = null;

document.getElementById('btnCompose').addEventListener('click', () => { modal.classList.add('open'); composeTo.focus(); });
document.getElementById('btnCloseModal').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

function closeModal() {
  modal.classList.remove('open');
  composeTo.value = '';
  composeMsg.value = '';
  selectedTemplate = null;
  autocompleteList.classList.remove('open');
  document.querySelectorAll('.template-seal').forEach(s => { s.classList.remove('active'); s.setAttribute('aria-checked','false'); });
}

function openComposeFor(name) {
  modal.classList.add('open');
  composeTo.value = name;
  composeMsg.focus();
}

// Autocomplete
composeTo.addEventListener('input', () => {
  const q = composeTo.value.toLowerCase();
  if (!q) { autocompleteList.classList.remove('open'); return; }
  const matches = LEADS.filter(l => l.name.toLowerCase().includes(q));
  if (matches.length === 0) { autocompleteList.classList.remove('open'); return; }
  autocompleteList.innerHTML = matches.map(l => `
    <div class="autocomplete-item" role="option" data-name="${l.name}">
      <div class="mini-seal" style="background:${l.color}">${l.initial}</div>
      ${l.name} <span style="color:var(--text-muted);font-size:.7rem;margin-left:auto">${l.affiliation}</span>
    </div>
  `).join('');
  autocompleteList.classList.add('open');
  autocompleteList.querySelectorAll('.autocomplete-item').forEach(item => {
    item.addEventListener('click', () => {
      composeTo.value = item.dataset.name;
      autocompleteList.classList.remove('open');
      applyTemplateText();
    });
  });
});

composeTo.addEventListener('blur', () => { setTimeout(() => autocompleteList.classList.remove('open'), 150); });

// Templates
const templates = {
  intro: (name) => `Dear ${name},\n\nWe at Weasleys' Wizard Wheezes are delighted to make your acquaintance! Our shelves are bursting with the finest magical mischief this side of Diagon Alley.\n\nMight we interest you in a personal tour of our latest innovations?\n\nWith whimsical regards,\nWeasleys' Wizard Wheezes`,
  followup: (name) => `Dear ${name},\n\nJust a quick owl to follow up on our recent conversation. We haven't forgotten about you — in fact, our pygmy puffs have been asking after you!\n\nShall we schedule a time to discuss next steps?\n\nMischievously yours,\nWeasleys' Wizard Wheezes`,
  offer: (name) => `Dear ${name},\n\nExciting news! For a limited time, we're offering an exclusive 15% discount on bulk orders. Our Skiving Snackboxes and Extendable Ears are flying off the shelves!\n\nDon't let this offer vanish like a Peruvian Instant Darkness Powder.\n\nYours in commerce,\nWeasleys' Wizard Wheezes`,
  thanks: (name) => `Dear ${name},\n\nA thousand thank-yous for your recent order! We're absolutely chuffed. Your support keeps the joke shop lights burning bright.\n\nPlease don't hesitate to owl us if you need anything at all.\n\nWith deepest gratitude,\nWeasleys' Wizard Wheezes`,
};

document.querySelectorAll('.template-seal').forEach(seal => {
  seal.addEventListener('click', () => {
    document.querySelectorAll('.template-seal').forEach(s => { s.classList.remove('active'); s.setAttribute('aria-checked','false'); });
    seal.classList.add('active');
    seal.setAttribute('aria-checked','true');
    selectedTemplate = seal.dataset.template;
    applyTemplateText();
  });
});

function applyTemplateText() {
  if (!selectedTemplate) return;
  const name = composeTo.value || 'friend';
  const firstName = name.split(' ')[0];
  composeMsg.value = templates[selectedTemplate](firstName);
}

// Send Owl
document.getElementById('btnSendOwl').addEventListener('click', () => {
  const name = composeTo.value || 'unknown wizard';
  closeModal();
  triggerOwlFlight();
  setTimeout(() => showToast(`Owl dispatched to ${name}!`), 800);
});

// =============================================
// OWL FLIGHT ANIMATION
// =============================================
function triggerOwlFlight() {
  const flight = document.getElementById('owlFlight');
  flight.classList.add('active');
  flight.innerHTML = '';

  // Flying owl SVG
  const owl = document.createElement('div');
  owl.className = 'flying-owl';
  owl.innerHTML = `<svg viewBox="0 0 60 40">
    <ellipse cx="30" cy="20" rx="18" ry="14" fill="var(--gold)" opacity="0.9"/>
    <circle cx="24" cy="16" r="4" fill="var(--navy)"/>
    <circle cx="36" cy="16" r="4" fill="var(--navy)"/>
    <circle cx="24" cy="15" r="2" fill="var(--gold)"/>
    <circle cx="36" cy="15" r="2" fill="var(--gold)"/>
    <path d="M28 22 Q30 25 32 22" fill="var(--navy)"/>
    <path d="M12 14 Q2 2 14 8" fill="var(--gold)" opacity=".8"/>
    <path d="M48 14 Q58 2 46 8" fill="var(--gold)" opacity=".8"/>
    <path d="M8 20 Q0 28 12 26" fill="var(--gold)" opacity=".6"/>
    <path d="M52 20 Q60 28 48 26" fill="var(--gold)" opacity=".6"/>
    <path d="M26 32 L30 36 L34 32" fill="none" stroke="var(--gold)" stroke-width="1.5"/>
  </svg>`;
  flight.appendChild(owl);

  // Feather particles
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const feather = document.createElement('div');
      feather.className = 'feather';
      feather.style.left = (15 + Math.random() * 70) + '%';
      feather.style.top = (30 + Math.random() * 30) + '%';
      feather.style.animationDuration = (1 + Math.random()) + 's';
      feather.style.animationDelay = '0s';
      feather.style.background = Math.random() > 0.5 ? 'var(--gold)' : 'var(--parchment-dark)';
      feather.style.transform = `rotate(${Math.random()*360}deg)`;
      flight.appendChild(feather);
      setTimeout(() => feather.remove(), 2000);
    }, 200 + i * 120);
  }

  setTimeout(() => { flight.classList.remove('active'); flight.innerHTML = ''; }, 2500);
}

// =============================================
// INIT
// =============================================
render();
</script>
</body>
</html>
