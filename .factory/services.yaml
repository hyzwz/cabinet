commands:
  install: npm install
  lint: npm run lint
  typecheck: npx tsc --noEmit
  test: npm test
  build: npm run build

services:
  web:
    start: PORT=4000 npm run dev
    stop: lsof -ti :4000 | xargs kill
    healthcheck: curl -sf http://127.0.0.1:4000
    port: 4000
    depends_on: []

  daemon:
    start: PORT=4100 npm run dev:daemon
    stop: lsof -ti :4100 | xargs kill
    healthcheck: curl -sf http://127.0.0.1:4100/health
    port: 4100
    depends_on: []
